version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
  api:
    build:
      context: .
      dockerfile: Presentation/ZenBlogServer.Api/Dockerfile
    depends_on:
      - db
    environment:
      ConnectionStrings__SqlServer: "Server=db,1433;Database=ZenBlogDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5000:80"
volumes:
  mssql-data:
